<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twif</title>
    <link rel="shortcut icon" href="assets/img/favicon.svg" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="../css/feed.css">
</head>

<body>

    <header>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#011214" viewBox="0 0 256 256"><path d="M228,128a12,12,0,0,1-12,12H40a12,12,0,0,1,0-24H216A12,12,0,0,1,228,128ZM40,76H216a12,12,0,0,0,0-24H40a12,12,0,0,0,0,24ZM216,180H40a12,12,0,0,0,0,24H216a12,12,0,0,0,0-24Z"></path></svg>

        <img src="assets/img/logo-dark.svg" alt="Logo Twif" width="80px">

        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#011214" viewBox="0 0 256 256"><path d="M232,128A104,104,0,1,1,128,24,104.13,104.13,0,0,1,232,128Z"></path></svg>

        
    </header>

    <main class="main">


        <!-- Formulário de postagem -->
        <div class="newPost">
            <div class="infoUser">
                <div class="imgUser"></div>
                <strong>Douglas Pujol</strong>
            </div>
            

            <form action="" class="formPost" id="formPost">
                <textarea name="textarea" placeholder="O que há de novo?..." id="textarea"></textarea>

                <div class="iconsAndButton">
                    <button type="submit" id="botao" class="btnSubmitForm">Publicar</button>
                </div>
            </form>
        </div>


        <ul class="posts" id="posts">
            <li class="post">
                <div class="infoUserPost">
                    <div class="imgUserPost"></div>
                    
                    <div class="nameAndHour">
                        <strong>Douglas Pujol</strong>
                        <p>21h</p>
                    </div>
                </div>

                <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit. Labore, fugiat!
                </p>

                <div class="actionBtnPost">
                    <button type="button" class="filesPost like"><i class="ph-bold ph-heart"></i></button>

                    <button type="button" class="filesPost comment"><i class="ph-bold ph-chat-circle"></i></button>
                </div>
            </li>
        </ul>
    </main>

    <script type="module" src="../js/FormPost.js"></script>
</body>
</html>
